[package]
name = "shikumi"
version = "0.1.0"
edition = "2024"
rust-version = "1.89.0"
description = "Shikumi (仕組み) — config discovery, hot-reload, and ArcSwap store for Nix-managed desktop apps"
homepage = "https://github.com/pleme-io/shikumi"
repository = "https://github.com/pleme-io/shikumi"
documentation = "https://docs.rs/shikumi"
readme = "README.md"
license = "MIT"
categories = ["config"]
keywords = ["config", "hot-reload", "nix", "figment", "arcswap"]

[lints.clippy]
pedantic = "warn"

[features]
default = []
# tatara-lisp config file support. Off by default because tatara-lisp is
# a monorepo-local crate (path = "../tatara/tatara-lisp") and including
# it unconditionally breaks git-based consumption of shikumi. Apps that
# need Lisp configs opt in explicitly.
lisp = ["dep:tatara-lisp"]

# Native HTTP client for Akeyless Vault via the akeyless-api SDK (604
# endpoints, 1334 types, generated from the Akeyless OpenAPI spec).
# Enables `resolve_akeyless_native` alongside the existing CLI-based
# `resolve_akeyless`. See docs/rfcs/0001-native-vault-sdks-via-forge-gen.md
# for the full native-integration story across all 5 vault backends.
akeyless-native = ["dep:akeyless-api", "dep:tokio"]

# Native AWS Secrets Manager via the upstream aws-sdk-secretsmanager
# crate. AWS generates their SDKs from Smithy, not OpenAPI, so we
# consume the official crate rather than regenerating via forge-gen.
# Pulls in the AWS credential chain (IRSA, IMDSv2, profile files) via
# aws-config. See RFC 0001 for the full rationale.
aws-native = ["dep:aws-sdk-secretsmanager", "dep:aws-config", "dep:tokio"]

[dependencies]
arc-swap = "1.8"
figment = { version = "0.10", features = ["env", "yaml", "toml"] }
notify = "8.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tracing = "0.1"
tatara-lisp = { path = "../tatara/tatara-lisp", optional = true }
# Feature-gated native Akeyless SDK (generated from OpenAPI via forge-gen).
akeyless-api = { git = "https://github.com/pleme-io/akeyless-api", optional = true }
# Feature-gated native AWS Secrets Manager SDK + credential provider chain.
aws-sdk-secretsmanager = { version = "1", optional = true }
aws-config = { version = "1", features = ["behavior-version-latest"], optional = true }
tokio = { version = "1", features = ["rt"], optional = true }

[dev-dependencies]
tempfile = "3"
serde_json = "1"
# For SecretSource::{op, sops, akeyless, …} YAML deserialization tests
serde_yaml = "0.9"
