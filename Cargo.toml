[package]
name = "shikumi"
version = "0.1.350"
edition = "2024"
rust-version = "1.89.0"
description = "Shikumi (仕組み) — config discovery, hot-reload, and ArcSwap store for Nix-managed desktop apps"
homepage = "https://github.com/pleme-io/shikumi"
repository = "https://github.com/pleme-io/shikumi"
documentation = "https://docs.rs/shikumi"
readme = "README.md"
license = "MIT"
categories = ["config"]
keywords = ["config", "hot-reload", "nix", "figment", "arcswap"]

[lints.clippy]
pedantic = "warn"

[features]
default = []
# tatara-lisp config file support. Off by default because tatara-lisp is
# a monorepo-local crate (path = "../tatara/tatara-lisp") and including
# it unconditionally breaks git-based consumption of shikumi. Apps that
# need Lisp configs opt in explicitly.
lisp = ["dep:tatara-lisp"]

# clap-based `<app> config-show <tier>` subcommand. The Pillar 12 dual
# of TieredConfig: one factory every consumer pulls in to eliminate
# hand-rolled config-show CLIs. Adds a `clap::Args` struct that runs
# `C::resolve_tier(...)` and emits YAML/JSON or diff between tiers.
cli = ["dep:clap"]

# Native HTTP client for Akeyless Vault via the akeyless-api SDK (604
# endpoints, 1334 types, generated from the Akeyless OpenAPI spec).
# Enables `resolve_akeyless_native` alongside the existing CLI-based
# `resolve_akeyless`. See docs/rfcs/0001-native-vault-sdks-via-forge-gen.md
# for the full native-integration story across all 5 vault backends.
akeyless-native = ["dep:akeyless-api", "dep:tokio"]

# Native AWS Secrets Manager via the upstream aws-sdk-secretsmanager
# crate. AWS generates their SDKs from Smithy, not OpenAPI, so we
# consume the official crate rather than regenerating via forge-gen.
# Pulls in the AWS credential chain (IRSA, IMDSv2, profile files) via
# aws-config. See RFC 0001 for the full rationale.
aws-native = ["dep:aws-sdk-secretsmanager", "dep:aws-config", "dep:tokio"]

# Native 1Password Connect client via thin reqwest HTTP. 1Password's
# Connect API is small enough (~8 endpoints for vaults + items) that a
# hand-written client is cheaper than generating a full SDK. See RFC 0001.
op-native = ["dep:reqwest", "dep:tokio"]

# Native HashiCorp Vault client via thin reqwest HTTP, covering KV v2
# (read/list/write/delete/metadata). See RFC 0001.
vault-native = ["dep:reqwest", "dep:tokio"]

# Native GCP Secret Manager client via thin reqwest HTTP. Auth is the
# caller's job: shikumi accepts a pre-obtained OAuth2 access token
# (from `gcloud auth print-access-token`, yup-oauth2, metadata server,
# or IRSA). This keeps the dep tree minimal — ADC handling stays in
# the consumer that already has auth plumbing. See RFC 0001.
gcp-native = ["dep:reqwest", "dep:tokio"]

# Per-field hot-swap-safety classification (theory/CALHA.md SS6.3):
# a T: HotSwapClassifier + Validate wrapper (ValidatedTieredConfig),
# a split blake3 watermark (full vs. restart-required subtree), and
# ConfigStore::load_and_watch_hotswap -- a sibling of load_and_watch
# that classifies each reload's diff and auto-swaps only the Free
# half, never the RequiresRestart half. `pleme-hotswap` provides the
# HotSwapClassifier trait + HotSwapClass/SwapDecision types this
# module's generic bounds require; `#[derive(HotSwap)]` (the separate
# `pleme-hotswap-derive` proc-macro crate) is how a consumer's own
# config struct implements that trait -- not a dependency of shikumi
# itself.
hotswap = ["dep:pleme-hotswap", "dep:blake3"]

[dependencies]
arc-swap = "1.8"
figment = { version = "0.10", features = ["env", "yaml", "toml"] }

# Typed-dispatcher catalog integration
# (theory/UNIFIED-COMPUTING-MODEL.md §VI).
gen-platform = { git = "https://github.com/pleme-io/gen" , version = "0.1" }
gen-types = { git = "https://github.com/pleme-io/gen" , version = "0.1" }
# Cargo features activate globally per-target — turning on a notify
# macOS backend feature in [dependencies] adds the apple-only backend
# crate as an unconditional dep for every target, including Linux
# (fsevent-sys fails to compile; kqueue → kqueue-sys fails to compile).
# The only correct seam is target-gating the feature itself: Linux
# gets bare notify (uses inotify, its only Linux backend), macOS opts
# into a real backend via the target-conditional block below.
notify = { version = "8.2", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Used by shikumi::tiered::ConfigDiff for structural YAML diffing
# in TieredConfig::diff_against's default impl. Must be a non-dev
# dep because tiered.rs is lib code that consumers compile against.
serde_yaml = "0.9"
thiserror = "2.0"
tracing = "0.1"
# Object-safe async trait — needed for SecretClient in secret_client.rs.
async-trait = "0.1"
tatara-lisp = { git = "https://github.com/pleme-io/tatara", package = "tatara-lisp", optional = true , version = "0.2" }
# Feature-gated `hotswap`: the HotSwapClassifier trait + HotSwapClass/
# SwapDecision runtime types a T: TieredConfig implementor's derived
# impl (via the sibling `pleme-hotswap-derive` proc-macro crate) must
# satisfy. The `pleme-hotswap-derive` repo hosts both crates.
pleme-hotswap = { git = "https://github.com/pleme-io/pleme-hotswap-derive", package = "pleme-hotswap", optional = true, version = "0.1" }
# Feature-gated `hotswap`: the split ConfigWatermark hash (full vs.
# restart-required subtree).
blake3 = { version = "1", optional = true }
# Feature-gated native Akeyless SDK (generated from OpenAPI via forge-gen).
akeyless-api = { git = "https://github.com/pleme-io/akeyless-api", optional = true , version = "0.1" }
# Feature-gated native AWS Secrets Manager SDK + credential provider chain.
aws-sdk-secretsmanager = { version = "1", optional = true }
aws-config = { version = "1", features = ["behavior-version-latest"], optional = true }
tokio = { version = "1", features = ["rt"], optional = true }
# Thin HTTP client for `op-native` / `vault-native`. rustls-tls avoids
# pulling openssl into the closure; the features match shikumi's
# deployment story (statically linked Nix binaries).
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"], optional = true }
# Feature-gated for the `cli` feature — clap Args for ConfigShowCommand.
clap = { version = "4", features = ["derive"], optional = true }

# macOS opts into the kqueue backend for notify. Gating via
# `[target.'cfg(target_os = "macos")']` is the only way to keep this
# feature out of Linux builds — Cargo feature unification per-target
# means a global `features = ["macos_kqueue"]` would activate the
# apple-only kqueue → kqueue-sys chain in every target.
[target.'cfg(target_os = "macos")'.dependencies]
notify = { version = "8.2", default-features = false, features = ["macos_kqueue"] }

[dev-dependencies]
tempfile = "3"
serde_json = "1"
# For SecretSource::{op, sops, akeyless, …} YAML deserialization tests
serde_yaml = "0.9"
# SecretClient async tests — needed even when no native features are on.
tokio = { version = "1", features = ["rt", "macros"] }
# `hotswap` feature tests only: real #[derive(HotSwap)] on a test
# struct, matching what a real hotswap consumer would use. Not a
# runtime dependency of shikumi itself.
pleme-hotswap-derive = { git = "https://github.com/pleme-io/pleme-hotswap-derive", package = "pleme-hotswap-derive" }
